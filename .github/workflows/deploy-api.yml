name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "web/api/**"
      - "cli/**"
      - "scripts/preflight-cloud-run.sh"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: device-streaming-067d747a
  GCP_REGION: us-central1
  LIMEN_CLOUD_RUN_SERVICE: limen-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # allow-secret
    steps:
      - uses: actions/checkout@v6

      - name: Note skipped API deploy
        if: ${{ secrets.GCP_SA_KEY == '' }}
        run: echo "::notice::GCP_SA_KEY secret not configured; skipping Cloud Run API deploy. The live runtime API remains the Cloudflare Worker (limen-runtime)."

      - uses: google-github-actions/auth@v3
        if: ${{ secrets.GCP_SA_KEY != '' }}
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3
        if: ${{ secrets.GCP_SA_KEY != '' }}

      - name: Preflight Cloud Run prerequisites
        if: ${{ secrets.GCP_SA_KEY != '' }}
        run: bash scripts/preflight-cloud-run.sh

      - name: Deploy Cloud Run API
        if: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          gcloud run deploy limen-api \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --source web/api \
            --allow-unauthenticated \
            --set-env-vars LIMEN_GITHUB_REPO=4444J99/limen,LIMEN_GITHUB_BRANCH=main,LIMEN_GITHUB_PATH=tasks.yaml,LIMEN_CORS_ORIGINS=https://device-streaming-067d747a.web.app \
            --set-secrets LIMEN_GITHUB_TOKEN=limen-github-token:latest,LIMEN_API_TOKEN=limen-api-token:latest,LIMEN_CLIENT_TOKEN=limen-client-token:latest # allow-secret

      - name: Print API URL
        if: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          gcloud run services describe limen-api \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)'
